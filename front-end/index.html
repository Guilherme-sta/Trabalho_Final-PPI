<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena ADS</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header class="topo">
        <div class="topo-esquerda">
            <h1>Arena ADS</h1>
            <p>Gerenciador de Torneios</p>
        </div>
        <div class="topo-direita">
            <select id="ordem">
                <option value="recentes">Mais recentes</option>
                <option value="nome">Nome</option>
                <option value="status">Por status</option>
            </select>
            <button id="botaoTema">Mudar tema</button>
        </div>
    </header>

    <main class ="container">
        <div id="mensagem" class="mensagem"></div>
        <div id="gradeTorneios"></div>
    </main>

    <button id="abrirTorneio" class="botao-adicionar" title="novo-torneio">+</button>

    <div id="popup" class="popup popup-escondido">
        <div class="caixa-popup">
            <button id="botaoFechar" class="fechar">x</button>
            <h2 id="titulo">Novo Torneio</h2>
            <input id="id" type="hidden">
            <label>Nome do torneio *</label>
            <input id="nome" placeholder="Ex: Copa ADS 2025">
            <label>Jogo *</label>
            <input id="jogo" placeholder="Ex: Valorant, CS2, FIFA">
            <label>Formato *</label>
            <select id="formato">
                <option value="">Selecione...</option>
                <option>Eliminação simples</option>
                <option>Eliminação dupla</option>
                <option>Todos contra todos</option>
                <option>Suiço</option>
            </select>
            <div id="blocoStatus" style="display: none">
                <label>Status</label>
                <select id="status">
                    <option value="aberto">Aberto</option>
                    <option value="em_andamento">Em andamento</option>
                    <option value="encerrado">Encerrado</option>
                </select>
            </div>
            <button id="salvar">Salvar</button>
        </div>
    </div>

    <script src="scripts/torneios.js"></script>
</body>
</html>
